# robo-data-catalog — K8s 배포 스펙 (이 서비스 단독). Neo4j 그래프 조회 API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robo-data-catalog
  namespace: robo
spec:
  replicas: 1
  selector:
    matchLabels: { app: robo-data-catalog }
  template:
    metadata:
      labels: { app: robo-data-catalog }
    spec:
      containers:
        - name: catalog
          image: robo/data-catalog:latest       # 엄브렐러 kustomization 에서 레지스트리 치환
          envFrom:
            - configMapRef: { name: robo-config }
            - secretRef: { name: robo-secret }
          ports: [ { containerPort: 5503 } ]
---
apiVersion: v1
kind: Service
metadata:
  name: robo-data-catalog
  namespace: robo
spec:
  selector: { app: robo-data-catalog }
  ports: [ { port: 5503, targetPort: 5503 } ]
